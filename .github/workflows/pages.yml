name: Deploy site to GitHub Pages

on:
  push:
    branches: [main, claude/dossier-landing-site-e59d88]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  # Validates the site builds and renders. Always self-contained — no Pages API.
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Build static site
        run: node site/build.mjs
      - name: Render OG image
        run: |
          cd site
          npm install --no-audit --no-fund
          node render-og.mjs
      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs

  # Deploys to Pages. Requires Pages to be enabled once
  # (Settings -> Pages -> Build and deployment -> Source: GitHub Actions).
  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure Pages
        uses: actions/configure-pages@v5
        with:
          enablement: true
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  # Ping IndexNow (Bing/Yandex/etc.) after a production deploy. Google ignores IndexNow.
  indexnow:
    needs: deploy
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Notify IndexNow
        run: node site/indexnow.mjs
