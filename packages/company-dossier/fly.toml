# Fly.io app for the company-dossier remote MCP server.
# Deploy: fly launch --no-deploy (first time) then `fly deploy` from this directory.
app = "company-dossier-mcp"
primary_region = "sjc"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8787"
  NODE_ENV = "production"

[http_service]
  internal_port = 8787
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.checks]
    [[http_service.checks]]
      grace_period = "5s"
      interval = "30s"
      method = "GET"
      path = "/health"
      timeout = "5s"

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
